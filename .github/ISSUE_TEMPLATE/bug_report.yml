name: Report an issue or feedback
description: "Bug, suggestion, improvement, or question about the Lethal-Reloaded modpack"
body:
  - type: markdown
    attributes:
      value: |
        **Before posting, please read this:**

        - **Never update the modpack over an existing profile.** Always create a NEW profile in your mod manager and re-download the modpack from scratch. Updating in place will break your install.
        - **Lethal Company must be on the latest version (V80 minimum).** Outdated game versions cause crashes and lobby mismatches.

  - type: input
    id: modpack-version
    attributes:
      label: Modpack version
      placeholder: "2.1.0"
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Type of issue
      options:
        - Bug
        - Suggestion / improvement
        - Question
        - Other
    validations:
      required: true

  - type: input
    id: players
    attributes:
      label: Number of players in the session
      description: "Useful if you're reporting a bug. Skip if you're asking a question or making a suggestion."
      placeholder: "4"
    validations:
      required: false

  - type: textarea
    id: details
    attributes:
      label: Tell us everything
      description: "Explain what happened, what you'd like, or ask your question. Add anything useful (logs, screenshots, steps to reproduce, etc.) - drop files or paste text directly here."
      placeholder: "Describe your issue, suggestion, or question here..."
    validations:
      required: true
